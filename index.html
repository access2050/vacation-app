<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로컬 연차 관리</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-bottom: 15px; box-sizing: border-box; }
        h2 { margin: 0 0 15px 0; color: #333; font-size: 1.1rem; }
        #totalPoints { color: var(--primary); font-size: 1.5rem; font-weight: bold; }
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; }
        .info { display: flex; flex-direction: column; }
        .date { font-weight: bold; color: #333; }
        .memo { font-size: 0.85rem; color: #666; }
        .del-btn { width: auto; padding: 5px 10px; background: #ff4d4d; font-size: 0.8rem; margin: 0; border: none; color: white; border-radius: 4px; }
    </style>
</head>
<body>

    <div class="card">
        <h2>내 연차 현황: <span id="totalPoints">0.0</span>개</h2>
        <input type="date" id="vacDate">
        <select id="vacType">
            <option value="-1">연차 사용 (-1)</option>
            <option value="-0.5">오전 반차 (-0.5)</option>
            <option value="-0.5">오후 반차 (-0.5)</option>
            <option value="1">연차 부여 (+1)</option>
        </select>
        <input type="text" id="vacMemo" placeholder="메모 (사유 등)">
        <button onclick="addVacation()">등록하기</button>
    </div>

    <div class="card" style="padding: 0;" id="historyList"></div>

    <script>
        // 로컬 스토리지 키 이름
        const STORAGE_KEY = 'my_vacation_data';
        let historyData = [];

        // 1. 초기 로드: 브라우저 저장소에서 데이터 읽기
        window.onload = () => {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                historyData = JSON.parse(saved);
            }
            
            // 오늘 날짜 설정 (날짜 밀림 방지: 로컬 시간 기준)
            const now = new Date();
            const offset = now.getTimezoneOffset() * 60000;
            const localISOTime = new Date(now - offset).toISOString().split('T')[0];
            document.getElementById('vacDate').value = localISOTime;
            
            renderUI();
        };

        // 2. 화면 그리기
        function renderUI() {
            const listDiv = document.getElementById('historyList');
            const totalSpan = document.getElementById('totalPoints');
            
            if (historyData.length === 0) {
                listDiv.innerHTML = '<div style="padding:20px; text-align:center; color:#999;">기록이 없습니다.</div>';
                totalSpan.innerText = "0.0";
                return;
            }

            let total = 0;
            listDiv.innerHTML = historyData.map((item, index) => {
                total += parseFloat(item.point);
                return `
                    <div class="list-item">
                        <div class="info">
                            <span class="date">${item.date} (${item.type})</span>
                            <span class="memo">${item.memo || '-'}</span>
                        </div>
                        <button class="del-btn" onclick="deleteItem(${index})">삭제</button>
                    </div>
                `;
            }).join('');
            
            totalSpan.innerText = total.toFixed(1);
        }

        // 3. 등록
        function addVacation() {
            const date = document.getElementById('vacDate').value;
            const typeSelect = document.getElementById('vacType');
            const typeText = typeSelect.options[typeSelect.selectedIndex].text.split(' ')[0];
            const point = parseFloat(typeSelect.value);
            const memo = document.getElementById('vacMemo').value;
            
            if(!date) return alert("날짜를 선택하세요!");

            const newItem = { date, point, type: typeText, memo };
            historyData.unshift(newItem); // 최신글이 위로
            
            saveAndRefresh();
            document.getElementById('vacMemo').value = "";
        }

        // 4. 삭제
        function deleteItem(index) {
            if(!confirm("삭제하시겠습니까?")) return;
            historyData.splice(index, 1);
            saveAndRefresh();
        }

        // 5. 저장 및 갱신
        function saveAndRefresh() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(historyData));
            renderUI();
        }
    </script>
</body>
</html>
