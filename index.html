<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연차 관리 매니저</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; --danger: #ff4d4d; }
        body { font-family: 'Pretendard', -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); width: 100%; max-width: 450px; margin-bottom: 20px; box-sizing: border-box; }
        h2 { margin: 0 0 15px 0; color: #333; font-size: 1.1rem; }
        #totalPoints { color: var(--primary); font-size: 1.8rem; font-weight: 800; }
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; outline: none; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.98); opacity: 0.9; }
        .list-container { max-height: 400px; overflow-y: auto; padding: 0; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .info { display: flex; flex-direction: column; gap: 4px; }
        .date { font-weight: 700; color: #333; font-size: 1rem; }
        .memo { font-size: 0.85rem; color: #888; }
        .point-tag { font-size: 0.8rem; padding: 2px 8px; border-radius: 5px; background: #eef5ff; color: var(--primary); font-weight: bold; margin-left: 5px; }
        .del-btn { width: auto; padding: 6px 12px; background: #fff; color: var(--danger); border: 1px solid var(--danger); font-size: 0.8rem; margin: 0; }
        .del-btn:hover { background: var(--danger); color: white; }
    </style>
</head>
<body>

    <div class="card">
        <h2>잔여 연차: <span id="totalPoints">0</span>개</h2>
        <input type="date" id="vacDate">
        <select id="vacType">
            <option value="-1">연차 사용 (-1)</option>
            <option value="-0.5">오전 반차 (-0.5)</option>
            <option value="-0.5">오후 반차 (-0.5)</option>
            <option value="1">연차 부여 (+1)</option>
        </select>
        <input type="text" id="vacMemo" placeholder="메모를 입력하세요">
        <button onclick="addVacation()">기록하기</button>
    </div>

    <div class="card list-container" id="historyList">
        </div>

    <script>
        // 1. 여기에 본인의 앱스크립트 URL을 넣으세요
        const API_URL = "https://script.google.com/macros/s/AKfycbzBm9hkTXdxZAgfi1rwoXZ-uJZgiBBmDl8QZ5grO-jZ2ax9lsBOurGrDOLBCj7sDLkq7Q/exec"; 
        let historyData = [];

        // 초기 로딩
        window.onload = () => {
            document.getElementById('vacDate').value = new Date().toISOString().substring(0, 10);
            fetchData();
        };

        // 데이터 가져오기
        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                historyData = await res.json();
                renderUI();
            } catch (e) { console.error("데이터 로드 실패"); }
        }

        // 화면 그리기 함수 (데이터와 화면을 일치시킴)
        function renderUI() {
            const listDiv = document.getElementById('historyList');
            const totalSpan = document.getElementById('totalPoints');
            
            let total = 0;
            let html = "";

            historyData.forEach((item) => {
                const p = parseFloat(item.point || 0);
                total += p;
                
                const d = item.date ? item.date.substring(0, 10) : "";
                html += `
                    <div class="list-item">
                        <div class="info">
                            <span class="date">${d} <span class="point-tag">${item.type}</span></span>
                            <span class="memo">${item.memo || '-'}</span>
                        </div>
                        <button class="del-btn" onclick="deleteItem('${d}', '${item.memo}')">삭제</button>
                    </div>
                `;
            });
            
            listDiv.innerHTML = html || '<div style="padding:20px; text-align:center; color:#ccc;">기록이 없습니다.</div>';
            totalSpan.innerText = total.toFixed(1);
        }

        // 등록하기 (즉시 반영)
        function addVacation() {
            const date = document.getElementById('vacDate').value;
            const typeSelect = document.getElementById('vacType');
            const typeText = typeSelect.options[typeSelect.selectedIndex].text.split(' ')[0];
            const point = parseFloat(typeSelect.value);
            const memo = document.getElementById('vacMemo').value;
            
            if(!date) return alert("날짜를 선택해주세요!");

            // 1. 로컬 데이터에 즉시 추가 (화면에 바로 보임)
            const newItem = { date: date, point: point, type: typeText, memo: memo };
            historyData.unshift(newItem); 
            renderUI();
            document.getElementById('vacMemo').value = ""; 

            // 2. 서버 전송 (백그라운드)
            fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ method: "add", date, type: point, typeText, memo })
            }).then(() => {
                console.log("저장 완료");
                fetchData(); // 서버와 최종 싱크
            });
        }

        // 삭제하기 (즉시 반영)
        function deleteItem(date, memo) {
            if(!confirm("정말 삭제할까요?")) return;
            
            // 1. 화면에서 즉시 필터링
            historyData = historyData.filter(item => 
                !(item.date.substring(0,10) === date && item.memo === memo)
            );
            renderUI();

            // 2. 서버 전송 (백그라운드)
            fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ method: "delete", date: date, memo: memo })
            }).then(() => fetchData());
        }
    </script>
</body>
</html>
