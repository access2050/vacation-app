<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연차 관리</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        /* 공통 카드 스타일 */
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-bottom: 15px; box-sizing: border-box; }
        
        h2 { margin: 0 0 15px 0; color: #333; font-size: 1.1rem; }
        #totalPoints { color: var(--primary); font-size: 1.5rem; font-weight: bold; }
        
        input, select, button { width: 100%; padding: 12px; margin: 6px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        /* 목록 스타일 수정 */
        .history-card { padding: 0; overflow: hidden; min-height: 50px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid #eee; }
        .list-item:last-child { border-bottom: none; }
        .no-data { padding: 30px; text-align: center; color: #999; font-size: 0.9rem; }
        
        .info { display: flex; flex-direction: column; gap: 2px; }
        .date { font-weight: bold; color: #333; }
        .memo { font-size: 0.85rem; color: #666; }
        .del-btn { width: auto; padding: 5px 10px; background: #ff4d4d; font-size: 0.8rem; margin: 0; }
    </style>
</head>
<body>

    <div class="card">
        <h2>내 연차 현황: <span id="totalPoints">0.0</span>개</h2>
        <input type="date" id="vacDate">
        <select id="vacType">
            <option value="-1">연차 사용 (-1)</option>
            <option value="-0.5">오전 반차 (-0.5)</option>
            <option value="-0.5">오후 반차 (-0.5)</option>
            <option value="1">연차 부여 (+1)</option>
        </select>
        <input type="text" id="vacMemo" placeholder="메모 (사유 등)">
        <button onclick="addVacation()">등록하기</button>
    </div>

    <div class="card history-card" id="historyList">
        <div class="no-data">데이터를 불러오는 중...</div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzBm9hkTXdxZAgfi1rwoXZ-uJZgiBBmDl8QZ5grO-jZ2ax9lsBOurGrDOLBCj7sDLkq7Q/exec"; // 👈 여기만 수정하세요!
        let historyData = [];

        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                historyData = await res.json();
                renderUI();
            } catch (e) {
                document.getElementById('historyList').innerHTML = '<div class="no-data">데이터 로드 실패 😢</div>';
            }
        }

        function renderUI() {
            const listDiv = document.getElementById('historyList');
            const totalSpan = document.getElementById('totalPoints');
            
            if (historyData.length === 0) {
                listDiv.innerHTML = '<div class="no-data">등록된 기록이 없습니다.</div>';
                totalSpan.innerText = "0.0";
                return;
            }

            let total = 0;
            listDiv.innerHTML = historyData.map(item => {
                total += parseFloat(item.point || 0);
                const d = item.date ? item.date.substring(0, 10) : "";
                return `
                    <div class="list-item">
                        <div class="info">
                            <span class="date">${d} (${item.type})</span>
                            <span class="memo">${item.memo || '-'}</span>
                        </div>
                        <button class="del-btn" onclick="deleteItem('${d}', '${item.memo}')">삭제</button>
                    </div>
                `;
            }).join('');
            
            totalSpan.innerText = total.toFixed(1);
        }

        function addVacation() {
            const date = document.getElementById('vacDate').value;
            const typeSelect = document.getElementById('vacType');
            const typeText = typeSelect.options[typeSelect.selectedIndex].text.split(' ')[0];
            const point = parseFloat(typeSelect.value);
            const memo = document.getElementById('vacMemo').value;
            
            if(!date) return alert("날짜를 선택하세요!");

            // 즉시 반영 로직
            const newItem = { date: date, point: point, type: typeText, memo: memo };
            historyData.unshift(newItem); 
            renderUI();
            document.getElementById('vacMemo').value = "";

            fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ method: "add", date, type: point, typeText, memo })
            }).then(() => fetchData());
        }

        function deleteItem(date, memo) {
            if(!confirm("삭제하시겠습니까?")) return;
            historyData = historyData.filter(item => !(item.date.substring(0,10) === date && item.memo === memo));
            renderUI();
            fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ method: "delete", date: date, memo: memo })
            }).then(() => fetchData());
        }

        window.onload = () => {
            document.getElementById('vacDate').value = new Date().toISOString().substring(0, 10);
            fetchData();
        };
    </script>
</body>
</html>
