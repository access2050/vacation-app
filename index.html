<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>연차 관리 시스템</title>
    <style>
        :root { --primary: #4a90e2; --bg: #f5f7fa; }
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 400px; margin-bottom: 20px; }
        h2 { margin-top: 0; color: #333; font-size: 1.2rem; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        button:active { opacity: 0.8; }
        .list-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid #eee; background: white; }
        .list-item:last-child { border-bottom: none; }
        .info { display: flex; flex-direction: column; }
        .date { font-weight: bold; color: #333; }
        .memo { font-size: 0.85rem; color: #666; }
        .del-btn { width: auto; padding: 5px 10px; background: #ff4d4d; font-size: 0.8rem; margin: 0; }
        #totalPoints { color: var(--primary); font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h2>내 연차 현황: <span id="totalPoints">0</span>개</h2>
        <input type="date" id="vacDate">
        <select id="vacType">
            <option value="-1">연차 사용 (-1)</option>
            <option value="-0.5">오전 반차 (-0.5)</option>
            <option value="-0.5">오후 반차 (-0.5)</option>
            <option value="1">연차 부여 (+1)</option>
        </select>
        <input type="text" id="vacMemo" placeholder="메모 (사유 등)">
        <button onclick="addVacation()">등록하기</button>
    </div>

    <div class="card" style="padding: 0; overflow: hidden;" id="historyList">
        </div>

    <script>
        // ⚠️ 본인의 Google Apps Script Web App URL로 반드시 변경하세요!
        const API_URL = "https://script.google.com/macros/s/AKfycbzBm9hkTXdxZAgfi1rwoXZ-uJZgiBBmDl8QZ5grO-jZ2ax9lsBOurGrDOLBCj7sDLkq7Q/exec"; 
        let history = [];

        // 1. 초기 데이터 불러오기
        async function fetchData() {
            try {
                const res = await fetch(API_URL);
                const data = await res.json();
                history = data;
                renderUI();
            } catch (e) { console.error("데이터 로드 실패"); }
        }

        // 2. 화면 그리기 (가장 중요: 이 함수가 실행될 때 딜레이가 없어야 함)
        function renderUI() {
            const listDiv = document.getElementById('historyList');
            const totalSpan = document.getElementById('totalPoints');
            
            let total = 0;
            listDiv.innerHTML = history.map(item => {
                total += parseFloat(item.point || 0);
                const displayDate = item.date ? item.date.substring(0, 10) : "";
                return `
                    <div class="list-item">
                        <div class="info">
                            <span class="date">${displayDate} (${item.type})</span>
                            <span class="memo">${item.memo || ''}</span>
                        </div>
                        <button class="del-btn" onclick="deleteItem('${displayDate}', '${item.memo}')">삭제</button>
                    </div>
                `;
            }).join('');
            
            totalSpan.innerText = total.toFixed(1);
        }

        // 3. 등록 (즉시 반영 로직)
        function addVacation() {
            const date = document.getElementById('vacDate').value;
            const typeSelect = document.getElementById('vacType');
            const typeText = typeSelect.options[typeSelect.selectedIndex].text.split(' ')[0];
            const point = parseFloat(typeSelect.value);
            const memo = document.getElementById('vacMemo').value;
            
            if(!date) return alert("날짜를 선택하세요!");

            // [핵심] 서버 응답 안 기다리고 일단 목록에 추가
            const newItem = { date: date, point: point, type: typeText, memo: memo };
            history.unshift(newItem); 
            renderUI(); // 즉시 화면 갱신
            document.getElementById('vacMemo').value = ""; // 입력창 초기화

            // 서버 전송은 백그라운드에서 실행
            fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ method: "add", date, type: point, typeText, memo })
            }).then(() => {
                console.log("동기화 완료");
                // 혹시 모르니 서버 데이터로 최종 싱크
                fetchData(); 
            });
        }

        // 4. 삭제 (즉시 반영 로직)
        function deleteItem(date, memo) {
            if(!confirm("삭제하시겠습니까?")) return;
            
            // [핵심] 화면에서 먼저 지우기
            history = history.filter(item => !(item.date.substring(0,10) === date && item.memo === memo));
            renderUI();

            // 서버 전송
            fetch(API_URL, { 
                method: "POST", 
                body: JSON.stringify({ method: "delete", date: date, memo: memo })
            }).then(() => fetchData());
        }

        // 페이지 로드 시 실행
        window.onload = () => {
            const today = new Date().toISOString().substring(0, 10);
            document.getElementById('vacDate').value = today;
            fetchData();
        };
    </script>
</body>
</html>
